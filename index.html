<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Копировальщик текста</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 40px 20px;
            background: #ffffff;
            margin: 60px 0 40px 0;
        }

        .copy-btn {
            width: 100%;
            max-width: 500px;
            padding: 14px 24px;
            font-size: 17px;
            font-weight: 500;
            border: none;
            border-radius: 6px;
            background: #f0f4fa;
            color: #1a202c;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            position: relative;
        }

            .copy-btn:hover {
                background: #e2e8f0;
            }

            .copy-btn:active {
                background: #d0d8e4;
            }

            .copy-btn .label-short {
                display: none;
            }

            .copy-btn .label-medium {
                display: none;
            }

            .copy-btn .label-full {
                display: none;
            }

        .mode-short .copy-btn .label-short {
            display: inline;
        }

        .mode-medium .copy-btn .label-medium {
            display: inline;
        }

        .mode-full .copy-btn .label-full {
            display: inline;
        }

        /* ===== ПАНЕЛЬ УПРАВЛЕНИЯ (режимы + размер) ===== */
        .control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ffffff;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
            min-width: 130px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

            .control-panel .panel-title {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: #7a8a9e;
                font-weight: 600;
                text-align: center;
                margin-bottom: 2px;
            }

            .control-panel .mode-group {
                display: flex;
                flex-direction: column;
                gap: 4px;
                padding-bottom: 8px;
                border-bottom: 1px solid #eef2f6;
            }

                .control-panel .mode-group label {
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    font-size: 14px;
                    color: #2d3748;
                    cursor: pointer;
                    padding: 3px 6px;
                    border-radius: 4px;
                    transition: background 0.15s;
                }

                    .control-panel .mode-group label:hover {
                        background: #f0f4fa;
                    }

                .control-panel .mode-group input[type="radio"] {
                    accent-color: #2b6cb0;
                    width: 15px;
                    height: 15px;
                    cursor: pointer;
                    flex-shrink: 0;
                }

            /* Блок управления размером */
            .control-panel .size-group {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                padding-top: 4px;
            }

                .control-panel .size-group .size-label {
                    font-size: 12px;
                    color: #4a5568;
                    font-weight: 500;
                }

            .control-panel .size-btn {
                width: 32px;
                height: 32px;
                border: 1px solid #d1d9e6;
                border-radius: 6px;
                background: #f7fafc;
                color: #2d3748;
                font-size: 18px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
                line-height: 1;
            }

                .control-panel .size-btn:hover {
                    background: #edf2f7;
                }

                .control-panel .size-btn:active {
                    background: #e2e8f0;
                }

            .control-panel .size-display {
                font-size: 14px;
                font-weight: 600;
                color: #2d3748;
                min-width: 32px;
                text-align: center;
            }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #2d3748;
            color: white;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 17px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.35s ease;
            pointer-events: none;
            z-index: 2000;
        }

            .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

        @media (max-width: 600px) {
            .control-panel {
                top: 12px;
                right: 12px;
                padding: 10px 12px;
                min-width: 110px;
            }

                .control-panel .mode-group label {
                    font-size: 12px;
                }

                .control-panel .size-btn {
                    width: 28px;
                    height: 28px;
                    font-size: 16px;
                }

                .control-panel .size-display {
                    font-size: 12px;
                    min-width: 28px;
                }

            .container {
                padding: 24px 16px;
                margin-top: 80px;
            }

            .copy-btn {
                font-size: 15px;
                padding: 12px 18px;
                max-width: 100%;
            }

            .toast {
                font-size: 15px;
                padding: 10px 20px;
                bottom: 24px;
                white-space: nowrap;
            }
        }

        @media (max-width: 420px) {
            .control-panel {
                top: 8px;
                right: 8px;
                padding: 8px 10px;
                min-width: 90px;
            }

                .control-panel .mode-group label {
                    font-size: 11px;
                    gap: 5px;
                }

                .control-panel .mode-group input[type="radio"] {
                    width: 14px;
                    height: 14px;
                }

                .control-panel .size-btn {
                    width: 24px;
                    height: 24px;
                    font-size: 14px;
                }

                .control-panel .size-display {
                    font-size: 11px;
                    min-width: 24px;
                }

            .copy-btn {
                font-size: 13px;
                padding: 10px 14px;
            }
        }
    </style>
</head>

        <button class="copy-btn" data-copy="Стример не поёт песни по запросу, пока стример не спросил что петь, предложения не принимаются. Карается мутом. При игнорировании карается баном.">
            <span class="label-short">17. Не поёт песни по запросу</span>
            <span class="label-medium">17. Стример не поёт песни по запросу, пока стример не спросил что петь.</span>
            <span class="label-full">17. Стример не поёт песни по запросу, пока стример не спросил что петь, предложения не принимаются. Карается мутом. При игнорировании карается баном.</span>
        </button>
    </div>

    <div class="toast" id="toast">Успешно скопировано!</div>

    <script>
        (function () {
            'use strict';

            const container = document.getElementById('appContainer');
            const radioButtons = document.querySelectorAll('input[name="mode"]');

            function applyMode(mode) {
                container.classList.remove('mode-short', 'mode-medium', 'mode-full');
                container.classList.add('mode-' + mode);
                try {
                    localStorage.setItem('copyMode', mode);
                } catch (e) { /* ignore */ }
            }

            radioButtons.forEach(function (radio) {
                radio.addEventListener('change', function () {
                    if (this.checked) {
                        applyMode(this.value);
                    }
                });
            });

            try {
                const savedMode = localStorage.getItem('copyMode');
                if (savedMode && ['short', 'medium', 'full'].includes(savedMode)) {
                    const targetRadio = document.querySelector('input[name="mode"][value="' + savedMode + '"]');
                    if (targetRadio) {
                        targetRadio.checked = true;
                        applyMode(savedMode);
                    } else {
                        const defaultRadio = document.querySelector('input[name="mode"][value="short"]');
                        if (defaultRadio) {
                            defaultRadio.checked = true;
                            applyMode('short');
                        }
                    }
                } else {
                    const defaultRadio = document.querySelector('input[name="mode"][value="short"]');
                    if (defaultRadio) {
                        defaultRadio.checked = true;
                        applyMode('short');
                    }
                }
            } catch (e) {
                const defaultRadio = document.querySelector('input[name="mode"][value="short"]');
                if (defaultRadio) {
                    defaultRadio.checked = true;
                    applyMode('short');
                }
            }

            const sizeDisplay = document.getElementById('sizeDisplay');
            const sizeDec = document.getElementById('sizeDec');
            const sizeInc = document.getElementById('sizeInc');
            const allButtons = document.querySelectorAll('.copy-btn');

            let currentSize = 17;
            const MIN_SIZE = 10;
            const MAX_SIZE = 32;

            try {
                const savedSize = localStorage.getItem('copyFontSize');
                if (savedSize) {
                    const parsed = parseInt(savedSize, 10);
                    if (!isNaN(parsed) && parsed >= MIN_SIZE && parsed <= MAX_SIZE) {
                        currentSize = parsed;
                    }
                }
            } catch (e) { /* ignore */ }

            function applyFontSize(size) {
                allButtons.forEach(function (btn) {
                    btn.style.fontSize = size + 'px';
                });
                sizeDisplay.textContent = size;
                try {
                    localStorage.setItem('copyFontSize', String(size));
                } catch (e) { /* ignore */ }
            }

            sizeDec.addEventListener('click', function () {
                if (currentSize > MIN_SIZE) {
                    currentSize--;
                    applyFontSize(currentSize);
                }
            });

            sizeInc.addEventListener('click', function () {
                if (currentSize < MAX_SIZE) {
                    currentSize++;
                    applyFontSize(currentSize);
                }
            });

            applyFontSize(currentSize);

            const buttons = document.querySelectorAll('.copy-btn');
            const toast = document.getElementById('toast');
            let toastTimer = null;

            function showToast() {
                if (toastTimer) {
                    clearTimeout(toastTimer);
                    toastTimer = null;
                }
                toast.classList.remove('show');
                void toast.offsetWidth;
                toast.classList.add('show');
                toastTimer = setTimeout(function () {
                    toast.classList.remove('show');
                    toastTimer = null;
                }, 2000);
            }

            function fallbackCopy(text) {
                try {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    textarea.style.left = '-9999px';
                    textarea.style.top = '-9999px';
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast();
                } catch (err) {
                    console.error('Fallback copy failed:', err);
                }
            }

            buttons.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    const textToCopy = this.getAttribute('data-copy');
                    if (!textToCopy) {
                        return;
                    }

                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(textToCopy)
                            .then(function () {
                                showToast();
                            })
                            .catch(function (err) {
                                console.error('Ошибка копирования:', err);
                                fallbackCopy(textToCopy);
                            });
                    } else {
                        fallbackCopy(textToCopy);
                    }
                });
            });
        })();
    </script>

</body>
</html>
